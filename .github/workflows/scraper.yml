name: Scraper

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scraper-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Setup Environment
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 2. Scrape and Commit
    - name: Run scraper
      run: |
        pip install requests
        python download.py
      working-directory: ./public
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_NOGI_CHANNEL: -1001313048085
        TELEGRAM_NEWS_CHANNEL: -1002323394494
        TELEGRAM_HINA_CHANNEL: -1001409510960
        TELEGRAM_SAKU_CHANNEL: -1001230600925

    - name: Commit changes
      run: |
            git remote set-url origin https://SakamichiSeries:${PAT}@github.com/SakamichiSeries/news-archive.git
            git config --global user.email "example@example.com"    
            git config --global user.name "GitHub Actions"
            git add .
            git commit -m "$(TZ='Asia/Tokyo' date)" || echo "No changes to commit"
            git push
      env:
        PAT: ${{ secrets.PAT }}

    # 3. Build Web App
    - name: Build
      run: |
        npm install
        npm run build

    # 4. Deploy to Pages (Combines artifact + deploy)
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./build

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    # 5. Wait and Trigger Self
    - name: Wait and Trigger Self
      env:
        GH_TOKEN: ${{ secrets.PAT }}
      run: |
        echo "Waiting 180 seconds..."
        sleep 180
        echo "Triggering next run..."
        gh workflow run scraper.yml --repo SakamichiSeries/news-archive
